services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://user:password@db:5432/casa_torino?sslmode=disable}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES: ${REFRESH_TOKEN_EXPIRES:-168h}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      PORT: ${PORT:-8080}
      ENV: ${ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: casa_torino
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d casa_torino"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
